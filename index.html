<!doctype html>
<html lang="fi">

<head>
  <meta charset="utf-8" />
  <title>Kartta</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
}

#map {
  height: 100vh;
  width: 100vw;
  background: #222;
}

.start-icon svg {
  overflow: visible;
}

#timer {
  font-weight: bold;
  margin-left: 8px;
}

#eventStatus {
  margin: 4px 0 8px 0;
  font-size: 13px;
}

#splitList {
  padding-left: 20px;
  margin: 6px 0 0 0;
}

#eventLogList {
  padding-left: 20px;
  margin: 6px 0 0 0;
}

#sidebar {
  position: absolute;
  top: 10px;
  left: 10px;
  bottom: 10px;
  width: 280px;
  z-index: 1000;
  background: white;
  border-radius: 10px;
  padding: 10px;
  font-family: Arial, sans-serif;

}

.panel-section {
  margin-bottom: 14px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.panel-section:last-child {
  border-bottom: none;
}

.panel-section b {
  display: block;

}

#sidebar button {
  margin: 3px 3px 3px 0;
  padding: 6px 8px;
}

#timer {
  display: block;

}

.control-number {
  color: #b000ff;
  font-size: 18px;
  font-weight: bold;

    -1px -1px 0 white,
     1px -1px 0 white,
    -1px  1px 0 white,
     1px  1px 0 white;
}

.pdf-report-box {
  background: rgba(255,255,255,0.92);
  padding: 10px;
  border: 2px solid #333;
  border-radius: 8px;
  font-family: Arial, sans-serif;
  font-size: 13px;
  max-width: 230px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

body.pdf-export .leaflet-top.leaflet-left {
  top: 5cm !important;

}

.pdf-report-box h3 {
  margin: 0 0 6px 0;

}

.pdf-report-box ul {
  margin: 5px 0 0 18px;

body.pdf-export #sidebar {
  display: none;
}

  width: 794px !important;

  margin: 0 !important;
}

body.pdf-export .leaflet-control-zoom {
  display: none;
}

body.pdf-export .leaflet-interactive {
  stroke-width: 2 !important;
}

body.pdf-export .control-number {

}

body.pdf-export .pdf-report-box {
  font-size: 10px;
  max-width: 230px;
  padding: 7px;

/* Puhelinnäkymä */
@media (max-width: 700px) {
  #map {
    height: 100vh;
    width: 100vw;
  }

  #sidebar {
    top: auto;
    left: 0;
    right: 0;
    bottom: 0;

    border-radius: 14px 14px 0 0;

#eventLogList {

}

#toggleSidebarBtn {

</head>

<div id="eventStatus">Ei käynnissä</div>

<b>Analyysi</b>
<div id="analysisBox">

</div>

<b>Väliajat</b>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script>
let eventName = "";

let courseLength = 0;
let routeLength = 0;

let map = L.map('map', {
  minZoom: 2,
  maxZoom: 19,
  preferCanvas: true
});

let osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

map.setView([63.096, 21.615], 14);
attachMapClickHandler();

const lineRenderer = L.canvas({
  padding: 0.5
});

let imageBounds = null;
let mapMode = "osm";

let imageOverlay = null;
let currentMapImageData = null;

const controlIcon = L.divIcon({
  className: 'control-icon',
  html: `
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="11" fill="none" stroke="#b000ff" stroke-width="4" />
    </svg>
  `,
  iconSize: [34, 34],
  iconAnchor: [17, 17]
});
const MAX_REASONABLE_SPEED = 8; // m/s, noin 4:10 min/km
const finishIcon = L.divIcon({
  className: 'finish-icon',
  html: `
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="11" fill="none" stroke="#b000ff" stroke-width="4" />
      <circle cx="17" cy="17" r="5" fill="none" stroke="#b000ff" stroke-width="4" />
    </svg>
  `,
  iconSize: [34, 34],
  iconAnchor: [17, 17]
});

let route = L.polyline([], {
  color: 'red',
  weight: 4,
  renderer: lineRenderer
}).addTo(map);

let addMode = null;
let controlNumber = 1;
let coursePoints = [];
let courseMarkers = [];
let coursePointMarkerGroups = [];
let courseLine = L.layerGroup().addTo(map);


const CONTROL_HIT_RADIUS = 35;
const MIN_ROUTE_POINT_DISTANCE = 3; // metriä
const GPS_READY_ACCURACY = 10;
const MAX_TRACK_ACCURACY = 12;

let timerRunning = false;
let startTime = null;
let timerInterval = null;
let currentEvent = null;
let eventLog = [];
let lastSplitMs = 0;
let wakeLock = null;
let pendingControl = null;
let gpsReady = false;
let lastPosition = null;
let watchId = null;
let gpsMarker = null;
let lastRealGps = null;
let calibrationMode = null;
let followGps = true;
let lastAcceptedRawGps = null;
let worstGpsAccuracy = 0;
let calibration = {
  A: null,
  B: null
};
let calibrationMarkers = {
  A: null,
  B: null
};


let lastSavedRealGps = null;


document.getElementById('fitMapBtn').addEventListener('click', () => {
  map.fitBounds(imageBounds);
});

document.getElementById('mapImageInput').addEventListener('change', (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

reader.onload = () => {
  resizeImageForStorage(reader.result, 1600, (smallImageData) => {
    currentMapImageData = smallImageData;
    loadMapImageFromData(currentMapImageData);
  });
};

reader.readAsDataURL(file);
});

function createCalibrationIcon(label) {
  return L.divIcon({
    className: 'calibration-icon',
    html: `
      <div style="
        position: relative;
        width: 30px;
        height: 30px;
      ">

        <!-- Pystyviiva -->
        <div style="
          position:absolute;
          left:14px;
          top:0;
          width:2px;
          height:30px;
          background:#00aaff;
        "></div>

        <!-- Vaakaviiva -->
        <div style="
          position:absolute;
          left:0;
          top:14px;
          width:30px;
          height:2px;
          background:#00aaff;
        "></div>

        <!-- Keskipiste -->
        <div style="
          position:absolute;
          left:10px;
          top:10px;
          width:10px;
          height:10px;
          border-radius:50%;
          background:#0066ff;
          border:2px solid white;
        "></div>

        <!-- A/B kirjain -->
        <div style="
          position:absolute;
          left:20px;
          top:-6px;
          color:#0066ff;
          font-weight:bold;
          font-size:14px;
          text-shadow:
            -1px -1px 0 white,
             1px -1px 0 white,
            -1px  1px 0 white,
             1px  1px 0 white;
        ">
          ${label}
        </div>

      </div>
    `,
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });
}

function calculateCourseLength() {
  let total = 0;

  for (let i = 0; i < coursePoints.length - 1; i++) {
    total += distanceMapUnits(
      coursePoints[i].lat,
      coursePoints[i].lon,
      coursePoints[i + 1].lat,
      coursePoints[i + 1].lon
    );
  }

  return total;
}
function updateStartButtonState() {
  const startBtn = document.getElementById('startBtn');

  const notReadyReason = isReadyToStart();

  startBtn.disabled = !!notReadyReason;

  if (notReadyReason) {
    startBtn.title = notReadyReason;
  } else {
    startBtn.title = "Valmis lähtöön";
  }
}

function buildSplitAnalysis(event) {
  if (!event || !event.splits || event.splits.length < 2) {
    return "<b>Rastivälit:</b><br>Ei rastivälitietoja";
  }

  let html = "<b>Rastivälit:</b><br>";

  for (let i = 1; i < event.splits.length; i++) {
    const prev = event.splits[i - 1];
    const curr = event.splits[i];

    const legMs = curr.elapsedMs - prev.elapsedMs;

    html +=
      i + ". " +
      prev.name + " → " + curr.name +
      ": " + formatTime(legMs) + "<br>";
  }

  return html;
}

function renderAnalysis(event) {
  const box = document.getElementById("analysisBox");

  if (!event) {
    box.innerHTML = "Ei analyysiä";
    return;
  }

  const distanceKm = event.rawDistanceMeters
    ? event.rawDistanceMeters / 1000
    : 0;

  const pace = event.paceMinPerKm
    ? event.paceMinPerKm.toFixed(1)
    : "-";

  const gpsAcc = event.worstGpsAccuracy
    ? Math.round(event.worstGpsAccuracy) + " m"
    : "-";

  box.innerHTML = `
  <b>Kokonaisaika:</b> ${event.totalTime || "-"}<br>
  <b>Matka:</b> ${distanceKm ? distanceKm.toFixed(2) + " km" : "-"}<br>
  <b>Keskivauhti:</b> ${pace !== "-" ? pace + " min/km" : "-"}<br>
  <b>Huonoin GPS:</b> ${gpsAcc}<br>
  <b>Rasteja:</b> ${event.splits ? event.splits.length - 1 : 0}<br><br>
  ${buildSplitAnalysis(event)}
<br><br>
${getBestAndWorstLeg(event)}
`;
}

function calculateRouteLength() {
  const points = route.getLatLngs();
  let total = 0;

  for (let i = 0; i < points.length - 1; i++) {
    total += distanceMapUnits(
      points[i].lat,
      points[i].lng,
      points[i + 1].lat,
      points[i + 1].lng
    );
  }

  return total;
}


async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('eventStatus').textContent =
        "Näyttö pidetään hereillä GPS-seurannan aikana";
    }
  } catch (err) {
    console.log("Wake Lock ei onnistunut:", err);
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
  }
}


function isGpsJumpTooLarge(prev, next) {
  if (!prev || !next) return false;

  const distance = distanceMeters(prev, next);
  const timeSec = (next.time - prev.time) / 1000;

  if (timeSec <= 0) return false;

  const speed = distance / timeSec;

  return speed > MAX_REASONABLE_SPEED;
}
function resizeImageForStorage(imageData, maxSize, callback) {
  const img = new Image();

  img.onload = () => {
    let w = img.naturalWidth;
    let h = img.naturalHeight;

    const scale = Math.min(1, maxSize / Math.max(w, h));

    w = Math.round(w * scale);
    h = Math.round(h * scale);

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);

    const compressedData = canvas.toDataURL('image/jpeg', 0.75);
    callback(compressedData);
  };

  img.src = imageData;
}


function updateStartButtonState() {
  const reason = isReadyToStart();
  const startBtn = document.getElementById('startBtn');

  if (reason) {
    startBtn.disabled = true;
    startBtn.textContent = "Aloita";
    document.getElementById('eventStatus').textContent =
      "Aloitus estetty: " + reason;
  } else {
    startBtn.disabled = false;
    startBtn.textContent = "Aloita";
    document.getElementById('eventStatus').textContent =
      "Valmis aloitukseen";
  }
}

function resetCalibration(message = "Kalibrointi tyhjennetty.") {
  calibration = {
    A: null,
    B: null
  };

  localStorage.removeItem("suunnistus_calibration");

  document.getElementById('calibStatus').textContent = message;

  Object.values(calibrationMarkers).forEach(marker => {
  if (marker) map.removeLayer(marker);
});

calibrationMarkers = {
  A: null,
  B: null
};
}

function recreateMapForImageMode() {
  map.remove();

  map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -4,
    maxZoom: 4,
    preferCanvas: true
  });

  route = L.polyline([], {
    color: 'red',
    weight: 4,
    renderer: L.canvas({ padding: 0.5 })
  }).addTo(map);

  courseLine = L.layerGroup().addTo(map);

  imageOverlay = null;
  attachMapClickHandler();
}


function loadMapImageFromData(imageData) {
  if (!imageData) return;

  mapMode = "image";

  recreateMapForImageMode();

  resetCalibration("Uusi kartta ladattu. Tee GPS-kalibrointi A ja B uudelleen.");

  const img = new Image();

  img.onload = () => {
    const w = img.naturalWidth;
    const h = img.naturalHeight;

    imageBounds = [[0, 0], [h, w]];

    imageOverlay = L.imageOverlay(imageData, imageBounds).addTo(map);

    map.fitBounds(imageBounds);

    document.getElementById('eventNameBox').style.display = "block";
    document.getElementById('eventNameInput').focus();

    document.getElementById('eventStatus').textContent =
      "Karttakuva ladattu. Lisää lähtö, rastit ja maali.";

    updateStartButtonState();
  };

  img.src = imageData;
}

document.getElementById('clearEventLogBtn').addEventListener('click', () => {
  clearSavedEvents();
});

document.getElementById('clearCourseBtn').addEventListener('click', () => {
  localStorage.removeItem("suunnistus_currentCourse");
  localStorage.removeItem("suunnistus_calibration");

  map.remove();

  map = L.map('map', {
    minZoom: 2,
    maxZoom: 19,

  });

    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  map.setView([63.096, 21.615], 14);
  attachMapClickHandler();

  mapMode = "osm";
  imageOverlay = null;
  imageBounds = null;
  currentMapImageData = null;

  route = L.polyline([], {
    color: 'red',
    weight: 4,
    renderer: L.canvas({ padding: 0.5 })
  }).addTo(map);

  courseLine = L.layerGroup().addTo(map);

  coursePoints = [];
  courseMarkers = [];

  addMode = null;

  document.getElementById('mapImageInput').value = "";
  document.getElementById('eventNameBox').style.display = "none";
  document.getElementById('splitList').innerHTML = "";
  document.getElementById('timer').textContent = "00:00:00.00";
  document.getElementById('eventStatus').textContent =
    "Kartta tyhjennetty. Käytössä normaali OSM-kartta.";

  if (gpsMarker) {
    gpsMarker = null;
  }

  currentEvent = null;
  renderAnalysis(null);
  updateStartButtonState();
  
});

});

document.getElementById('addFinishBtn').addEventListener('click', () => {

  if (finishExists) {

  }

  addMode = "finish";

document.getElementById('undoPointBtn').addEventListener('click', () => {

});

document.getElementById('startBtn').addEventListener('click', () => {
  if (timerRunning) return;

  const notReadyReason = isReadyToStart();

  if (notReadyReason) {
    alert("Ei voida aloittaa: " + notReadyReason);
    return;
  }

 

  timerRunning = true;

  requestWakeLock();

document.getElementById('stopBtn').addEventListener('click', () => {

function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);

  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  const hundredths = Math.floor((ms % 1000) / 10);

  return String(hours).padStart(2, '0') + ':' +
         String(minutes).padStart(2, '0') + ':' +
         String(seconds).padStart(2, '0') + '.' +
         String(hundredths).padStart(2, '0');
}


function addPoint(lat, lon, smooth = true) {
  route.addLatLng([lat, lon]);

  if (smooth) {
    const smoothed = smoothRoute(route.getLatLngs());
    route.setLatLngs(smoothed);
  }

  if (currentEvent) {
    currentEvent.routePoints.push({
      lat: lat,
      lon: lon,
      time: Date.now() - startTime
    });
  }
}

function attachMapClickHandler() {
  map.on('click', (e) => {

    if (calibrationMode) {
      saveCalibrationPoint(calibrationMode, e.latlng);
      calibrationMode = null;
      return;
    }

    if (!addMode) return;

    const lat = e.latlng.lat;
    const lon = e.latlng.lng;

    const markerGroup = [];

function useCoursePointForCalibration(point) {
  if (!calibrationMode) return false;

  saveCalibrationPoint(
    calibrationMode,

  );

  calibrationMode = null;

  return true;
}

function shortenLineSegment(p1, p2, cut) {
  const dx = p2.lon - p1.lon;
  const dy = p2.lat - p1.lat;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance <= cut * 2) {
    return null;
  }

  const ratio = cut / distance;

  return [
    [p1.lat + dy * ratio, p1.lon + dx * ratio],
    [p2.lat - dy * ratio, p2.lon - dx * ratio]
  ];
}

function updateCourseLine(cut = 12) {
  courseLine.clearLayers();

  for (let i = 0; i < coursePoints.length - 1; i++) {
    const p1 = coursePoints[i];
    const p2 = coursePoints[i + 1];

    let segment = shortenLineSegment(p1, p2, cut);

    if (!segment) {
      segment = [
        [p1.lat, p1.lon],
        [p2.lat, p2.lon]
      ];
    }

    L.polyline(segment, {
      color: '#b000ff',
      weight: 3,
      opacity: 0.9,
      dashArray: null,
      lineCap: 'round',
      lineJoin: 'round',
      renderer: lineRenderer
    }).addTo(courseLine);
  }
}

function updateStartDirection(size = 34) {
  const startIndex = coursePoints.findIndex(p => p.type === "start");
  const firstControl = coursePoints.find(p => p.type === "control");

  if (startIndex === -1 || !firstControl) return;

  const markerGroup = coursePointMarkerGroups[startIndex];
  if (!markerGroup || !markerGroup[0]) return;

  markerGroup[0].setIcon(
    createStartIconTowards(coursePoints[startIndex], firstControl, size)
  );
}

function createStartIconTowards(startPoint, targetPoint, size = 34) {
  const c = size / 2;
  const s = size / 34;

  const dx = targetPoint.lon - startPoint.lon;
  const dy = -(targetPoint.lat - startPoint.lat);

  const len = Math.sqrt(dx * dx + dy * dy) || 1;

  const ux = dx / len;
  const uy = dy / len;

  const tipX = c + ux * 13 * s;
  const tipY = c + uy * 13 * s;

  const backX = c - ux * 10 * s;
  const backY = c - uy * 10 * s;

  const sideX = -uy;
  const sideY = ux;

  const base1X = backX + sideX * 10 * s;
  const base1Y = backY + sideY * 10 * s;

  const base2X = backX - sideX * 10 * s;
  const base2Y = backY - sideY * 10 * s;

  return L.divIcon({
    className: 'start-icon',
    html: `
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <polygon
          points="${tipX},${tipY} ${base1X},${base1Y} ${base2X},${base2Y}"
          fill="none"
          stroke="#b000ff"
          stroke-width="${4 * s}"
          stroke-linejoin="round"
        />
      </svg>
    `,
    iconSize: [size, size],
    iconAnchor: [c, c]
  });
}

function finishEvent() {
  if (!currentEvent) return;
  if (currentEvent.totalTime) return;

  const totalMs = Date.now() - startTime;
  const totalTimeText = formatTime(totalMs);

  let rawDistanceMeters = calculateRawGpsDistance();


  const rawDistanceKm = rawDistanceMeters / 1000;
  const paceMinPerKm = rawDistanceKm > 0
    ? (totalMs / 60000) / rawDistanceKm
    : 0;

  courseLength = calculateCourseLength();
  routeLength = calculateRouteLength();

  currentEvent.totalTime = totalTimeText;
  currentEvent.courseLength = courseLength;
  currentEvent.routeLength = routeLength;
  currentEvent.worstGpsAccuracy = worstGpsAccuracy;
  currentEvent.rawDistanceMeters = rawDistanceMeters;
  currentEvent.paceMinPerKm = paceMinPerKm;

  document.getElementById('eventStatus').textContent =
    "Valmis - kokonaisaika " + totalTimeText +
    " | matka " + rawDistanceKm.toFixed(2) + " km" +
    " | vauhti " + paceMinPerKm.toFixed(1) + " min/km";

  renderAnalysis(currentEvent);
  setCourseEditingEnabled(true);
  saveEventToLog();
}
function calculateRawGpsDistance() {
  if (!currentEvent || !currentEvent.rawGpsPoints) return 0;

  let total = 0;
  const points = currentEvent.rawGpsPoints;

  for (let i = 0; i < points.length - 1; i++) {
    total += distanceMeters(
      { lat: points[i].lat, lon: points[i].lon },
      { lat: points[i + 1].lat, lon: points[i + 1].lon }
    );
  }

  return total;
}

function gpsToMeters(gps, refLat) {
  const metersPerDegLat = 110540;
  const metersPerDegLon = 111320 * Math.cos(refLat * Math.PI / 180);

  return {
    x: gps.lon * metersPerDegLon,
    y: gps.lat * metersPerDegLat
  };
}

function gpsToMapPoint(realLat, realLon) {
  if (!calibration.A || !calibration.B) {
    return null;
  }

  const refLat = calibration.A.gps.lat;

  const gA = gpsToMeters(calibration.A.gps, refLat);
  const gB = gpsToMeters(calibration.B.gps, refLat);
  const gP = gpsToMeters({ lat: realLat, lon: realLon }, refLat);

  const mA = calibration.A.map;
  const mB = calibration.B.map;

  const gx = gB.x - gA.x;
  const gy = gB.y - gA.y;

  const px = gP.x - gA.x;
  const py = gP.y - gA.y;

  const mx = mB.lon - mA.lon;
  const my = mB.lat - mA.lat;

  const gLen2 = gx * gx + gy * gy;

  if (gLen2 === 0) return null;

  const u = (px * gx + py * gy) / gLen2;
  const v = (gx * py - gy * px) / gLen2;

  return {
    lat: mA.lat + u * my + v * mx,
    lon: mA.lon + u * mx - v * my
  };
}

  let maxControlNumber = 0;

  coursePoints.forEach((point) => {

    if (point.type === "start") {

        .addTo(map)
        .bindPopup("Lähtö");

      courseMarkers.push(marker);
      markerGroup.push(marker);

    if (point.type === "control") {
      const match = point.name.match(/\d+/);
      const number = match ? parseInt(match[0], 10) : 0;
      maxControlNumber = Math.max(maxControlNumber, number);

      const marker = L.marker([point.lat, point.lon], { icon: controlIcon })
        .addTo(map)
        .bindPopup(point.name);

      courseMarkers.push(marker);
      markerGroup.push(marker);

      const numberIcon = L.divIcon({
        className: 'control-number',

      });

      const numberMarker = L.marker([point.lat, point.lon], {
        icon: numberIcon,
        interactive: false
      }).addTo(map);

      courseMarkers.push(numberMarker);
      markerGroup.push(numberMarker);
    }

    if (point.type === "finish") {
      const marker = L.marker([point.lat, point.lon], { icon: finishIcon })
        .addTo(map)
        .bindPopup("Maali");

      courseMarkers.push(marker);

function distanceMeters(gps1, gps2) {
  if (!gps1 || !gps2) return Infinity;

  const R = 6371000;
  const lat1 = gps1.lat * Math.PI / 180;
  const lat2 = gps2.lat * Math.PI / 180;
  const dLat = (gps2.lat - gps1.lat) * Math.PI / 180;
  const dLon = (gps2.lon - gps1.lon) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1) * Math.cos(lat2) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return R * c;
}  

function startGpsTracking() {
  if (!navigator.geolocation) {
    alert("GPS ei ole tuettu");
    return;
  }

  if (watchId !== null) {
    document.getElementById('eventStatus').textContent =
      "GPS-seuranta on jo käynnissä.";
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    (position) => {
      const realLat = position.coords.latitude;
      const realLon = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      if (accuracy > MAX_TRACK_ACCURACY) {
  document.getElementById('eventStatus').textContent =
    "GPS-piste hylätty, tarkkuus " + Math.round(accuracy) + " m";
  return;
} 

      if (accuracy <= GPS_READY_ACCURACY) {
        gpsReady = true;
        updateStartButtonState();
      }

      if (accuracy > 20) {
        document.getElementById('eventStatus').textContent =
          "GPS liian epätarkka (" + Math.round(accuracy) + " m)";
        return;
      }

      lastRealGps = {
        lat: realLat,
        lon: realLon,
        accuracy: accuracy
      };

      worstGpsAccuracy = Math.max(worstGpsAccuracy, accuracy);

      if (timerRunning && currentEvent) {
        const newRawPoint = {
          lat: realLat,
          lon: realLon,
          accuracy: accuracy,
          time: Date.now() - startTime
        };

        const previousRawPoint =
          currentEvent.rawGpsPoints[currentEvent.rawGpsPoints.length - 1];

        if (!isGpsJumpTooLarge(previousRawPoint, newRawPoint)) {
          currentEvent.rawGpsPoints.push(newRawPoint);
          lastAcceptedRawGps = newRawPoint;
        } else {
          console.log("GPS-hyppy hylätty:", newRawPoint);
          return;
        }
      }

        const mapPoint = mapMode === "image"
          ? gpsToMapPoint(realLat, realLon)
          : null;
      if (mapPoint) {
        document.getElementById('eventStatus').textContent =
          "GPS kartalla | tarkkuus " + Math.round(accuracy) + " m";

        updateGpsMarker(mapPoint.lat, mapPoint.lon);

        if (timerRunning) {
          const currentGps = { lat: realLat, lon: realLon };
          const movedMeters = distanceMeters(lastSavedRealGps, currentGps);

          if (movedMeters >= MIN_ROUTE_POINT_DISTANCE) {
            addPoint(mapPoint.lat, mapPoint.lon);
            lastSavedRealGps = currentGps;
          }
        }

        checkControlVisits(mapPoint.lat, mapPoint.lon);

        if (followGps) {
          map.panTo([mapPoint.lat, mapPoint.lon]);
        }

      } else {
        document.getElementById('eventStatus').textContent =
          "GPS toimii normaalikartalla: " +
          realLat.toFixed(6) + ", " +
          realLon.toFixed(6) +
          " tarkkuus " + Math.round(accuracy) + " m";

        updateGpsMarker(realLat, realLon);

        if (timerRunning) {
          const currentGps = { lat: realLat, lon: realLon };
          const movedMeters = distanceMeters(lastSavedRealGps, currentGps);

          if (movedMeters >= MIN_ROUTE_POINT_DISTANCE) {
            addPoint(realLat, realLon, false);
            lastSavedRealGps = currentGps;
          }
        }

        checkControlVisits(realLat, realLon);

        if (followGps) {
          map.panTo([realLat, realLon]);
        }
      }

      gpsReady = true;
      updateStartButtonState();
    },
    (error) => {
      alert("GPS-virhe: " + error.message);
      watchId = null;
      updateStartButtonState();
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    }
  );

  document.getElementById('eventStatus').textContent =
    "GPS-seurantaa käynnistetään...";
}

function stopGpsTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }

  gpsReady = false;
}
function smoothRoute(points, strength = 0.15) {
  if (points.length < 3) return points;

  const result = [];
  result.push(points[0]);

  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const next = points[i + 1];

    result.push({
      lat:
        curr.lat * (1 - strength) +
        ((prev.lat + next.lat) / 2) * strength,

      lng:
        curr.lng * (1 - strength) +
        ((prev.lng + next.lng) / 2) * strength
    });
  }

  result.push(points[points.length - 1]);
  return result;
}
function distanceMapUnits(aLat, aLon, bLat, bLon) {
  const dx = bLon - aLon;
  const dy = bLat - aLat;
  return Math.sqrt(dx * dx + dy * dy);
}
function distanceForCurrentMap(aLat, aLon, bLat, bLon) {

  if (mapMode === "osm") {

    return distanceMeters(
      { lat: aLat, lon: aLon },
      { lat: bLat, lon: bLon }
    );

  } else {

    return distanceMapUnits(
      aLat,
      aLon,
      bLat,
      bLon
    );
  }
}

function checkControlVisits(lat, lon) {
  if (!timerRunning || !currentEvent) return;

  const nextPoint = coursePoints.find(point =>
    point.type !== "start" && !point.visited
  );

  if (!nextPoint) return;

 const distance = distanceForCurrentMap(
  lat,
  lon,
  nextPoint.lat,
  nextPoint.lon
);

  const FINISH_IMMEDIATE_RADIUS = 8;

if (
  nextPoint.type === "finish" &&
  distance <= FINISH_IMMEDIATE_RADIUS
) {

  nextPoint.visited = true;

  const elapsedMs = Date.now() - startTime;
  const timeText = formatTime(elapsedMs);

  currentEvent.splits.push({
    name: nextPoint.name,
    time: timeText,
    elapsedMs: elapsedMs
  });

  addSplit(nextPoint.name, timeText);

  document.getElementById('eventStatus').textContent =
    "Maali leimattu - " + timeText;

  timerRunning = false;

  clearInterval(timerInterval);

  pendingControl = null;

  finishEvent();

  return;
}

  const ENTER_RADIUS = CONTROL_HIT_RADIUS;
  const EXIT_MARGIN = 8;

  if (!pendingControl || pendingControl.name !== nextPoint.name) {
    if (distance <= ENTER_RADIUS) {
      pendingControl = {
        name: nextPoint.name,
        point: nextPoint,
        bestDistance: distance,
        bestElapsedMs: Date.now() - startTime
      };

      document.getElementById('eventStatus').textContent =
        nextPoint.name + " alueella...";
    }

    return;
  }

  if (distance < pendingControl.bestDistance) {
    pendingControl.bestDistance = distance;
    pendingControl.bestElapsedMs = Date.now() - startTime;
    return;
  }

  if (distance > pendingControl.bestDistance + EXIT_MARGIN) {
    const point = pendingControl.point;
    point.visited = true;

    const elapsedMs = pendingControl.bestElapsedMs;
    const timeText = formatTime(elapsedMs);

    currentEvent.splits.push({
      name: point.name,
      time: timeText,
      elapsedMs: elapsedMs
    });

    addSplit(point.name, timeText);

    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200]);
    }

    document.getElementById('eventStatus').textContent =
      point.name + " leimattu lähimmästä kohdasta - " + timeText;

    pendingControl = null;

    if (point.type === "finish") {
      timerRunning = false;
      clearInterval(timerInterval);
      finishEvent();
    }
  }
}



 



function setCourseEditingEnabled(enabled) {
  document.getElementById('addStartBtn').disabled = !enabled;
  document.getElementById('addControlBtn').disabled = !enabled;
  document.getElementById('addFinishBtn').disabled = !enabled;
  document.getElementById('undoPointBtn').disabled = !enabled;
  document.getElementById('mapImageInput').disabled = !enabled;
}




function updateGpsMarker(lat, lon) {
  if (!gpsMarker) {
    gpsMarker = L.circleMarker([lat, lon], {
      radius: 7,
      color: 'blue',
      fillColor: 'blue',
      fillOpacity: 0.9,
      weight: 2
    }).addTo(map);
  } else {
    gpsMarker.setLatLng([lat, lon]);
  }
}

async function exportPdf() {
  let reportControl = null;

  try {
    const { jsPDF } = window.jspdf;

    const oldWidth = map.getContainer().style.width;
    const oldHeight = map.getContainer().style.height;

    document.body.classList.add("pdf-export");

    reportControl = createPdfReportBox();
    reportControl.addTo(map);

    map.invalidateSize(true);
    map.fitBounds(imageBounds);

    setPdfIconSizes(true);
    updateCourseLine(50);

    route.setStyle({ weight: 2 });
    route.redraw();

    courseLine.eachLayer(layer => {
      if (layer.setStyle) layer.setStyle({ weight: 2 });
      if (layer.redraw) layer.redraw();
    });

    map.invalidateSize(true);
    map.fitBounds(imageBounds);
    updateCourseLine(50);
    route.redraw();

    await new Promise(resolve => setTimeout(resolve, 700));

    const canvas = await html2canvas(document.getElementById('map'), {
      scale: 2,
      useCORS: false,
      allowTaint: true,
      backgroundColor: "#ffffff"
    });

    const imgData = canvas.toDataURL('image/png');

    const pdf = new jsPDF('portrait', 'mm', 'a4');
    pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);

    const fileName = (currentEvent?.name || "suunnistus")
      .replace(/[^\wåäöÅÄÖ-]/g, "_");

    pdf.save(fileName + ".pdf");

    if (reportControl) {
      map.removeControl(reportControl);
    }

    setPdfIconSizes(false);
    updateCourseLine(12);
    route.setStyle({ weight: 4 });

    document.body.classList.remove("pdf-export");

    map.getContainer().style.width = oldWidth;
    map.getContainer().style.height = oldHeight;
    map.invalidateSize();
    map.fitBounds(imageBounds);

    updateStartDirection();
    route.setStyle({ weight: 4 });
    updateCourseLine();

  } catch (err) {
    console.error(err);
    alert("PDF-vienti epäonnistui: " + err.message);

    if (reportControl) {
      map.removeControl(reportControl);
    }

    setPdfIconSizes(false);
    updateCourseLine(12);
    route.setStyle({ weight: 4 });
    document.body.classList.remove("pdf-export");
    map.invalidateSize();
  }

  
}

function createPdfReportBox() {
  const control = L.control({
    position: "topleft"
  });

  control.onAdd = function () {
    const div = L.DomUtil.create('div', 'pdf-report-box');

    const name = currentEvent?.name || "Nimetön tapahtuma";
    const total = currentEvent?.totalTime || document.getElementById('timer').textContent;

    const distanceKm = currentEvent?.rawDistanceMeters
      ? (currentEvent.rawDistanceMeters / 1000).toFixed(2) + " km"
      : "-";

    const pace = currentEvent?.paceMinPerKm
      ? currentEvent.paceMinPerKm.toFixed(1) + " min/km"
      : "-";

    let html = `
      <h3>${name}</h3>
      <b>Kokonaisaika:</b> ${total}<br>
      <b>Matka:</b> ${distanceKm}<br>
      <b>Keskivauhti:</b> ${pace}<br><br>

      ${getBestAndWorstLeg(currentEvent)}

      <br><br>
      <b>Väliajat:</b>
      <ul>
    `;

    if (currentEvent && currentEvent.splits.length > 0) {
      currentEvent.splits.forEach(split => {
        html += `<li>${split.name}: ${split.time}</li>`;
      });
    } else {
      html += `<li>Ei väliaikoja</li>`;
    }

    html += `</ul>`;

    div.innerHTML = html;
    return div;
  };

  return control;
}

function getBestAndWorstLeg(event) {
  if (!event || !event.splits || event.splits.length < 2) {
    return "";
  }

  let best = null;
  let worst = null;

  for (let i = 1; i < event.splits.length; i++) {
    const prev = event.splits[i - 1];
    const curr = event.splits[i];

    const legMs = curr.elapsedMs - prev.elapsedMs;

    const leg = {
      from: prev.name,
      to: curr.name,
      timeMs: legMs
    };

    if (!best || legMs < best.timeMs) {
      best = leg;
    }

    if (!worst || legMs > worst.timeMs) {
      worst = leg;
    }
  }

  return `
    <b>Nopein väli:</b><br>
    ${best.from} → ${best.to}
    (${formatTime(best.timeMs)})<br><br>

    <b>Hitain väli:</b><br>
    ${worst.from} → ${worst.to}
    (${formatTime(worst.timeMs)})
  `;
}

function setPdfIconSizes(isPdf) {
  if (!isPdf) {
    coursePoints.forEach((point, index) => {
      const markerGroup = coursePointMarkerGroups[index];
      if (!markerGroup || !markerGroup[0]) return;

      if (point.type === "start") markerGroup[0].setIcon(createStartIcon());
      if (point.type === "control") markerGroup[0].setIcon(controlIcon);
      if (point.type === "finish") markerGroup[0].setIcon(finishIcon);
    });

    updateStartDirection();
    return;
  }

  coursePoints.forEach((point, index) => {
    const markerGroup = coursePointMarkerGroups[index];
    if (!markerGroup || !markerGroup[0]) return;

    if (point.type === "start") {
      markerGroup[0].setIcon(createStartIcon(16));
    }

    if (point.type === "control") {
      markerGroup[0].setIcon(createControlIcon(16));
    }

    if (point.type === "finish") {
      markerGroup[0].setIcon(createFinishIcon(16));
    }
  });

  updateStartDirection(16);
}

function loadCurrentCourse() {
  const saved = localStorage.getItem("suunnistus_currentCourse");

  if (!saved) return;

  const courseData = JSON.parse(saved);

  if (courseData.mapImageData) {
    currentMapImageData = courseData.mapImageData;
    loadMapImageFromData(currentMapImageData);
  }

  imageBounds = courseData.imageBounds || imageBounds;
  controlNumber = courseData.controlNumber || 1;

  if (courseData.coursePoints) {
    drawCourseFromPoints(courseData.coursePoints);
  }
}

loadEventLogFromStorage();
loadCurrentCourse();
loadCalibrationFromStorage();
updateStartButtonState();
